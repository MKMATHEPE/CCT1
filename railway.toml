# railway.toml
# ---------------------------------------------------------------------------
# Railway deployment configuration for the Node.js API server.
# Place this file in the project root (next to package.json).
#
# Railway auto-detects Node.js via Nixpacks but this file locks down the
# build/start commands and sets the health check so deploys don't go live
# if the server can't connect to Supabase.
# ---------------------------------------------------------------------------

[build]
# Railway needs to build only the server, not the Vite frontend
buildCommand = "cd server && npm ci && npm run build"

[deploy]
# Start the compiled server
startCommand = "cd server && node dist/index.js"

# Health check — Railway pings this before routing traffic to the new deploy.
# Your /health endpoint already exists. If Supabase creds are wrong, this
# will fail and Railway won't promote the broken build.
healthcheckPath = "/health"
healthcheckTimeout = 30

# Graceful shutdown — gives in-flight requests time to finish
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
# Expose port 8787 (must match PORT in env vars)
internalPort = 8787
